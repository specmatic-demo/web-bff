version: 3
dependencies:
  services:
    - service:
        $ref: "#/components/services/webBff"
        runOptions:
          graphqlsdl:
            host: localhost
            port: 4000
components:
  sources:
    centralContractRepo:
      git:
        url: https://github.com/specmatic-demo/central-contract-repository
  services:
    webBff:
      description: "Web BFF dependency"
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/centralContractRepo"
            specs:
              - spec:
                  path: "contracts/services/web-bff/graphql/schema.graphql"
